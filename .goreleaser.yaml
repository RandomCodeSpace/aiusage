# GoReleaser config for aiusage — cross-platform binaries, archives and
# checksums attached to a GitHub Release. Version is derived from the git tag
# (vX.Y.Z) and injected into the binary via ldflags so `aiusage version` and the
# CLI/daemon version-sync report the real release version instead of "dev".
#
# Local dry run:  goreleaser release --snapshot --clean --skip=publish
version: 2

project_name: aiusage

before:
  hooks:
    - go mod tidy

builds:
  - id: aiusage
    main: .
    binary: aiusage
    env:
      - CGO_ENABLED=0
    # Linux and macOS only. aiusage is a Unix tool: the daemon uses flock
    # (syscall.Flock) and the resource monitor uses statfs (syscall.Statfs),
    # neither of which exists on Windows — and the monitor reads /sys/fs/cgroup,
    # which is Linux-specific anyway. Windows is intentionally not a target.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/RandomCodeSpace/aiusage/internal/buildinfo.Version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
