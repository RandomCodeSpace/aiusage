# SonarCloud configuration for aiusage.
#
# organization / projectKey follow SonarCloud's GitHub auto-provisioning naming.
# If your SonarCloud org or key differ, change these two lines to match what the
# SonarCloud UI shows for this project.
sonar.organization=randomcodespace
sonar.projectKey=RandomCodeSpace_aiusage
sonar.host.url=https://sonarcloud.io

# Project layout: analyse the whole module; tests are the *_test.go files.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/*_test.go,docs/**,**/testdata/**
sonar.sourceEncoding=UTF-8

# Go test coverage produced by `go test -coverprofile=coverage.out` in CI.
sonar.go.coverage.reportPaths=coverage.out
